<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone – Accedi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
     <link rel="icon" href="assets/img/image.png">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="login-screen">
        <div class="login-box">
            <div class="text-center mb-4">
                <i class="bi bi-spotify spotify-logo"></i>
                <h1 class="login-title">Spotify</h1>
            </div>
            <h2 class="text-center text-white mb-4">Accedi a Spotify</h2>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-white">Email o nome utente</label>
                    <input type="text" class="form-control login-input" id="loginUser" placeholder="Email o nome utente">
                    <div id="loginEmailError" class="text-danger small mt-1 d-none">Inserisci un'email o un nome utente valido.</div>
                </div>
                <div class="mb-3">
                    <label class="form-label text-white">Password</label>
                    <input type="password" class="form-control login-input" id="loginPass" placeholder="Password">
                </div>
                <button type="submit" class="btn btn-spotify w-100 mb-3" id="loginSubmitBtn">ACCEDI</button>
                <hr class="text-secondary">
                <div class="text-center text-white-50">
                    Non hai un account? <a href="#" class="text-white">Iscriviti a Spotify</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/login.js"></script>
</body>
</html>
