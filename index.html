<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <!--
      Entry point per GitHub Pages: senza index.html, Pages mostra il README.
      Reindirizza subito a login.html (vera pagina iniziale dell'app).
      Il meta refresh funziona anche con JavaScript disabilitato.
    -->
    <meta http-equiv="refresh" content="0; url=login.html" />
    <title>Caricamento…</title>
  </head>
  <body>
    <!-- Fallback nel caso il refresh automatico non scatti -->
    <p>Reindirizzamento in corso… <a href="login.html">Apri l'app</a></p>
  </body>
</html>
