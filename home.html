<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone – Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="app-container">
<canvas id="glitterCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999;"></canvas>
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo-container" id="logoBtn" style="cursor:pointer;" title="Vai alla Home">
                <i class="bi bi-spotify"></i>
                <span>Spotify</span>
            </div>

            <nav class="main-nav">
                <a href="home.html" class="nav-link active" data-page="home">
                    <i class="bi bi-house-door-fill"></i>
                    <span>Home</span>
                </a>
                <a href="search.html" class="nav-link" data-page="search">
                    <i class="bi bi-search"></i>
                    <span>Cerca</span>
                </a>
                <a href="home.html" class="nav-link" data-page="library">
                    <i class="bi bi-music-note-list"></i>
                    <span>La tua libreria</span>
                </a>
            </nav>

            <div class="playlist-actions">
                <a href="#" class="nav-link" id="createPlaylistBtn">
                    <div class="action-icon"><i class="bi bi-plus-lg"></i></div>
                    <span>Crea playlist</span>
                </a>
                <a href="liked.html" class="nav-link" data-page="liked">
                    <div class="action-icon liked-icon"><i class="bi bi-heart-fill"></i></div>
                    <span>Brani che ti piacciono</span>
                </a>
            </div>

            <hr class="sidebar-divider">
            <div class="user-playlists" id="userPlaylists"></div>
        </aside>

        <!-- AREA PRINCIPALE -->
        <main class="main-content">
            <header class="top-bar">
                <div class="nav-buttons">
                    <button class="nav-btn" id="backBtn"><i class="bi bi-chevron-left"></i></button>
                    <button class="nav-btn" id="forwardBtn"><i class="bi bi-chevron-right"></i></button>
                </div>
                <div class="user-menu">
                    <button class="user-btn">
                        <i class="bi bi-person-circle"></i>
                        <span id="userName">Utente</span>
                        <i class="bi bi-caret-down-fill small"></i>
                    </button>
                </div>
            </header>
            <div class="content-area" id="contentArea"></div>
        </main>

        <!-- PLAYER IN BASSO -->
        <footer class="player">
            <div class="player-left">
                <img id="playerCover" src="" alt="" class="player-cover" style="display:none;">
                <div class="player-track-info">
                    <div class="track-title" id="playerTitle">Nessun brano in riproduzione</div>
                    <div class="track-artist" id="playerArtist">--</div>
                </div>
                <button class="btn-icon ms-3" id="likeBtn"><i class="bi bi-heart"></i></button>
            </div>

            <div class="player-center">
                <div class="player-controls">
                    <button class="btn-icon" id="shuffleBtn"><i class="bi bi-shuffle"></i></button>
                    <button class="btn-icon" id="prevBtn"><i class="bi bi-skip-start-fill"></i></button>
                    <button class="btn-play" id="playBtn"><i class="bi bi-play-fill"></i></button>
                    <button class="btn-icon" id="nextBtn"><i class="bi bi-skip-end-fill"></i></button>
                    <button class="btn-icon" id="repeatBtn"><i class="bi bi-repeat"></i></button>
                </div>
                <div class="player-progress">
                    <span class="time-text" id="currentTime">0:00</span>
                    <div class="progress-bar-container" id="progressContainer">
                        <div class="progress-bar-fill" id="progressFill"></div>
                    </div>
                    <span class="time-text" id="totalTime">0:00</span>
                </div>
            </div>

            <div class="player-right">
                <button class="btn-icon"><i class="bi bi-music-note-list"></i></button>
                <button class="btn-icon"><i class="bi bi-pc-display"></i></button>
                <button class="btn-icon" id="volumeBtn"><i class="bi bi-volume-up-fill"></i></button>
                <div class="volume-bar-container" id="volumeContainer">
                    <div class="volume-bar-hover" id="volumeHover"></div>
                    <div class="volume-bar-fill" id="volumeFill" style="width:70%;">
                        <div class="volume-bar-thumb"></div>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <!-- MODAL CREA PLAYLIST -->
    <div class="modal fade" id="playlistModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Crea nuova playlist</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" class="form-control login-input" id="newPlaylistName" placeholder="Nome playlist">
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Annulla</button>
                    <button type="button" class="btn btn-spotify" id="confirmPlaylistBtn">Crea</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL MODIFICA PROFILO -->
    <div class="modal fade" id="profileModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Modifica profilo</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex gap-3 align-items-center">
                        <div class="profile-photo-edit" id="profilePhotoEdit" onclick="document.getElementById('profilePhotoInput').click()">
                            <span id="profilePhotoPlaceholder"><i class="bi bi-camera-fill"></i></span>
                        </div>
                        <div class="flex-grow-1">
                            <label class="form-label text-white">Nome</label>
                            <input type="text" class="form-control login-input" id="editDisplayName" placeholder="Il tuo nome">
                            <small class="text-white-50 d-block mt-2">Clicca sull'immagine per caricare una foto</small>
                        </div>
                    </div>
                    <input type="file" id="profilePhotoInput" accept="image/*" style="display:none;">
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Annulla</button>
                    <button type="button" class="btn btn-spotify" id="saveProfileBtn">Salva</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="none"></audio>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/itunes-api.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/home.js"></script>
</body>
</html>
